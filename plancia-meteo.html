// --- CONFIGURAZIONE FIREBASE -------------------------------------------

const NOMI_PUNTI_ORDINE = ["roseto_nord", "roseto_sud", "pineto", "offshore"];
const EMOJI_BANDIERA = { verde: "badge-verde", giallo: "badge-giallo", rosso: "badge-rosso", fuori_orario: "badge-fuori_orario" };
const COLORE_HEX = { verde: "#2F9E44", giallo: "#F0B429", rosso: "#E0393E" };

let ultimoStato = null;
let rilevazioniOggi = [];
let letturaStazione = null;

let livelloRadarAttuale = null;
let timerAnimazioneRadar = null;

function dataOggiRoma() {
  const formattatore = new Intl.DateTimeFormat("en-CA", { timeZone: "Europe/Rome", year: "numeric", month: "2-digit", day: "2-digit" });
  return formattatore.format(new Date());
}

function oraRoma() {
  return new Intl.DateTimeFormat("it-IT", { timeZone: "Europe/Rome", hour: "2-digit", minute: "2-digit" }).format(new Date());
}

// --- BUSSOLA SVG (elemento distintivo: settore garbino evidenziato) -----
function puntoSulCerchio(cx, cy, raggio, gradi) {
  const rad = (gradi - 90) * Math.PI / 180;
  return [cx + raggio * Math.cos(rad), cy + raggio * Math.sin(rad)];
}

function arcoSettore(cx, cy, raggioInterno, raggioEsterno, gradoInizio, gradoFine) {
  const [x1, y1] = puntoSulCerchio(cx, cy, raggioEsterno, gradoInizio);
  const [x2, y2] = puntoSulCerchio(cx, cy, raggioEsterno, gradoFine);
  const [x3, y3] = puntoSulCerchio(cx, cy, raggioInterno, gradoFine);
  const [x4, y4] = puntoSulCerchio(cx, cy, raggioInterno, gradoInizio);
  return `M ${x1} ${y1} A ${raggioEsterno} ${raggioEsterno} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${raggioInterno} ${raggioInterno} 0 0 0 ${x4} ${y4} Z`;
}

function nomeDirezioneVento(gradi) {
  if (gradi === null || gradi === undefined) return "n/d";
  const direzioni = ["N", "NE", "E", "SE", "S", "SO", "O", "NO"];
  const indice = Math.round(gradi / 45) % 8;
  return direzioni[indice];
}

function creaBussola(direzione, rischioGarbino, dimensione = 76) {
  const cx = dimensione / 2;
  const cy = dimensione / 2;
  const raggio = dimensione / 2 - 4;
  const settoreGarbino = arcoSettore(cx, cy, raggio - 4, raggio, 247, 293);

  let ago = "";
  if (direzione !== null && direzione !== undefined) {
    const [puntaX, puntaY] = puntoSulCerchio(cx, cy, raggio - 10, direzione);
    const coloreAgo = rischioGarbino ? "#E0393E" : "#C99B4A";
    ago = `<line x1="${cx}" y1="${cy}" x2="${puntaX}" y2="${puntaY}" stroke="${coloreAgo}" stroke-width="2.5" stroke-linecap="round" />
           <circle cx="${cx}" cy="${cy}" r="3" fill="${coloreAgo}" />`;
  }

  return `<svg width="${dimensione}" height="${dimensione}" viewBox="0 0 ${dimensione} ${dimensione}">
    <circle cx="${cx}" cy="${cy}" r="${raggio}" fill="none" stroke="#234653" stroke-width="1.5" />
    <path d="${settoreGarbino}" fill="#E0393E" opacity="0.55" />
    <text x="${cx}" y="9" fill="#7FA0A8" font-size="7" font-family="IBM Plex Mono" text-anchor="middle">N</text>
    ${ago}
  </svg>`;
}

// --- CLASSIFICAZIONE ACCORDO MODELLI -------------------------------------
function classificaAccordo(spreadNodi) {
  if (spreadNodi === null || spreadNodi === undefined) return { etichetta: "n/d", colore: "var(--ink-faint)" };
  if (spreadNodi < 3) return { etichetta: "alto", colore: "var(--flag-verde)" };
  if (spreadNodi < 7) return { etichetta: "medio", colore: "var(--flag-giallo)" };
  return { etichetta: "basso", colore: "var(--flag-rosso)" };
}

function oraCorrente(orario) {
  if (!orario || !orario.length) return null;
  const adesso = Date.now();
  let migliore = orario[0];
  let distanzaMin = Infinity;
  for (const o of orario) {
    const d = Math.abs(new Date(o.ora).getTime() - adesso);
    if (d < distanzaMin) { distanzaMin = d; migliore = o; }
  }
  return migliore;
}

// --- RENDER CARTE PUNTI ---------------------------------------------------
function renderPunti(ultimaRilevazione) {
  const puntiOrdinati = [...ultimaRilevazione.punti].sort(
    (a, b) => NOMI_PUNTI_ORDINE.indexOf(a.punto) - NOMI_PUNTI_ORDINE.indexOf(b.punto)
  );

  const bandiera = ultimaRilevazione.bandiera;

  let html = `<div class="griglia-punti">`;
  for (const p of puntiOrdinati) {
    const oraAttuale = oraCorrente(p.orario);
    const oraMareAttuale = p.mare ? oraCorrente(p.mare) : null;
    const accordo = classificaAccordo(oraAttuale ? oraAttuale.vento_spread_nodi : null);
    const rischioGarbino = oraAttuale ? oraAttuale.garbino_rischio : false;
    const classeSelezionata = p.punto === puntoSelezionato ? "selezionata" : "";
    const t = p.tendenzeMare || {};

    html += `
      <div class="carta-punto bandiera-${bandiera.colore} ${classeSelezionata}" data-punto="${p.punto}">
        <div class="carta-testa">

function renderSelettoreEGrafico(ultimaRilevazione) {
  const puntiOrdinati = [...ultimaRilevazione.punti].sort(
    (a, b) => NOMI_PUNTI_ORDINE.indexOf(a.punto) - NOMI_PUNTI_ORDINE.indexOf(b.punto)
  );

  let html = `
    <div class="pannello-grafico">
      <div class="sezione-titolo">
        <span>Andamento vento — oggi</span>
        <div class="selettore-punti" id="selettore-punti">
          ${puntiOrdinati.map((p) => `<button class="pillola ${p.punto === puntoSelezionato ? "attiva" : ""}" data-punto="${p.punto}">${p.nome}</button>`).join("")}
        </div>
      </div>
      <div class="grafico-contenitore"><canvas id="grafico-vento"></canvas></div>
      <div class="legenda-grafico">
        <span class="legenda-voce"><span class="segno-legenda" style="background:#C99B4A"></span>consenso (mediana modelli)</span>
        <span class="legenda-voce"><span class="segno-legenda" style="background:#4C6870"></span>intervallo min–max tra i modelli</span>
        <span class="legenda-voce"><span class="segno-legenda" style="background:#E0393E"></span>rischio garbino</span>
      </div>

}

function disegnaGrafico(puntoId) {
  const canvas = document.getElementById("grafico-vento");
  if (!canvas) return;

  const rilevazioniConPunto = rilevazioniOggi
    .map((r) => {
      const dati = r.punti.find((p) => p.punto === puntoId);
      if (!dati) return null;
      const oraRif = oraCorrente(dati.orario);
      return { rilevazione: r.rilevazione, oraRif };
    })
    .filter(Boolean);

  const etichette = rilevazioniConPunto.map((r) => `${r.rilevazione.slice(0, 2)}:${r.rilevazione.slice(2)}`);
  const consenso = rilevazioniConPunto.map((r) => r.oraRif ? r.oraRif.vento_consenso_nodi : null);
  const massimi = rilevazioniConPunto.map((r) => r.oraRif ? r.oraRif.vento_max_nodi : null);
  const minimi = rilevazioniConPunto.map((r) =>
    r.oraRif && r.oraRif.vento_max_nodi !== null && r.oraRif.vento_spread_nodi !== null
      ? r.oraRif.vento_max_nodi - r.oraRif.vento_spread_nodi
      : null
  );
  const coloriPunti = rilevazioniConPunto.map((r) => (r.oraRif && r.oraRif.garbino_rischio ? "#E0393E" : "#C99B4A"));

  if (grafico) grafico.destroy();

  grafico = new Chart(canvas, {
    type: "line",
    data: {
      labels: etichette,
      datasets: [
        {
          label: "Massimo",
          data: massimi,
          borderWidth: 0,
          pointRadius: 0,
          fill: "+1",
          backgroundColor: "rgba(76, 104, 112, 0.25)",
          tension: 0.3,
        },
        {
          label: "Minimo",
          data: minimi,
          borderWidth: 0,
          pointRadius: 0,
          fill: false,
          tension: 0.3,
        },
        {
          label: "Consenso",
          data: consenso,
          borderColor: "#C99B4A",
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: coloriPunti,
          pointBorderWidth: 0,
          fill: false,
          tension: 0.3,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#7FA0A8", font: { family: "IBM Plex Mono", size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: "#1A3641" } },
        y: { ticks: { color: "#7FA0A8", font: { family: "IBM Plex Mono", size: 10 } }, grid: { color: "#1A3641" }, title: { display: true, text: "nodi", color: "#7FA0A8", font: { size: 10 } } },
      },
    },
  });
}

function renderBannerEventi(eventi, tendenzeMare, fronti) {
  let righe = "";
  if (eventi && eventi.pioggiaInArrivo) {
    righe += `<div class="banner-riga">🌧 Pioggia in arrivo — probabilità fino al ${eventi.probabilitaPioggiaMaxPerc}% nelle prossime ore.</div>`;
  }
  if (eventi && eventi.raffichaInArrivo) {
    righe += `<div class="banner-riga">💨 Raffiche in arrivo — fino a ${eventi.rafficaMaxProssimeOreNodi.toFixed(0)} nodi nelle prossime ore.</div>`;
  }
  if (tendenzeMare && tendenzeMare.ondeInAumento) {
    righe += `<div class="banner-riga">🌊 Onde in aumento — +${tendenzeMare.deltaOndeM.toFixed(1)} m nelle prossime ore.</div>`;
  }
  if (tendenzeMare && tendenzeMare.correnteInAumento) {
    righe += `<div class="banner-riga">🌀 Corrente in aumento — +${tendenzeMare.deltaCorrenteNodi.toFixed(1)} nodi nelle prossime ore.</div>`;
  }
  if (tendenzeMare && tendenzeMare.mareaInCrescita) {
    righe += `<div class="banner-riga">〰️ Marea in crescita — +${tendenzeMare.deltaMareaM.toFixed(2)} m nelle prossime ore.</div>`;
  }
  if (fronti && fronti.length > 0) {
    for (const f of fronti) {
      righe += `<div class="banner-riga">🌩️ Nuvolosità in avvicinamento da ${f.direzione} (${f.nuvolositaPerc ?? "n/d"}% stimato, vento allineato) — previsione, non pioggia confermata: verifica sul radar sopra.</div>`;
    }
  }
  return righe ? `<div class="banner-eventi">${righe}</div>` : "";
}

function urlImmagineSatellite(layer) {
  // EUMETView WMS — pubblico, nessuna registrazione richiesta.
  const bbox = "12.5,41.5,16.0,44.0"; // lon_min,lat_min,lon_max,lat_max — Adriatico centrale
  const params = new URLSearchParams({
    service: "WMS",
    version: "1.1.1",
    request: "GetMap",
    layers: `msg_fes:${layer}`,
    bbox,
    width: "700",
    height: "500",
    srs: "EPSG:4326",
    format: "image/png",
    _: Date.now(), // rompe la cache del browser: ogni richiesta è considerata "nuova"
  });
  return `https://view.eumetsat.int/geoserver/wms?${params.toString()}`;
}

      getDoc(doc(db, "meteoGiornaliero", oggi)),
      getDocs(query(collection(db, "meteoGiornaliero", oggi, "rilevazioni"), limit(500))),
      getDoc(doc(db, "stazioneLocale", "roseto_nord")).catch(() => null),
      getDoc(doc(db, "stazioniPubblicheNetatmo", oggi)).catch(() => null),
    ]);

    if (docOggi.exists() && docOggi.data().ultimaRilevazione) {

    }

    // Nessun orderBy (per evitare indici composti): leggiamo e ordiniamo lato client.
    rilevazioniOggi = rilevazioniSnap.docs

      .sort((a, b) => a.rilevazione.localeCompare(b.rilevazione));

    document.getElementById("footer-info").textContent = `${rilevazioniOggi.length} rilevazioni oggi · dati Open-Meteo (ensemble 5 modelli)`;

    letturaStazione = docStazione && docStazione.exists() ? docStazione.data().ultimaLettura : null;
    riepilogoPubbliche = docPubbliche && docPubbliche.exists() ? docPubbliche.data().ultimoRiepilogo : null;

    document.getElementById("testo-live").textContent = "errore di connessione";
    document.getElementById("pallino-live").style.background = "#E0393E";

  renderTutto();

// --- RADAR PIOGGIA (RainViewer) --------------------------------------------
function formattaOrarioRadar(timestampUnix) {
  return new Intl.DateTimeFormat("it-IT", { timeZone: "Europe/Rome", hour: "2-digit", minute: "2-digit" }).format(new Date(timestampUnix * 1000));
}

function mostraFrameRadar(indice) {
  if (!mappaRadar || !framesRadar[indice]) return;
  posizioneAnimazioneRadar = indice;
  const frame = framesRadar[indice];

  if (livelloRadarAttuale) mappaRadar.removeLayer(livelloRadarAttuale);
  livelloRadarAttuale = L.tileLayer(`${hostRadar}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`, { opacity: 0.75, zIndex: 5, maxNativeZoom: 7 });
  livelloRadarAttuale.addTo(mappaRadar);

  const eFuturo = indice >= framesRadar.length - numeroFrameNowcastRadar;
  const etichetta = eFuturo ? "nowcast" : "osservato";
  const testoTempo = document.getElementById("radar-tempo");
  if (testoTempo) {
    testoTempo.innerHTML = `${formattaOrarioRadar(frame.time)} <span class="${eFuturo ? "futuro" : ""}">(${etichetta})</span>`;
  }
}

function spostaFrameRadar(delta) {
  let nuovaPosizione = posizioneAnimazioneRadar + delta;
  if (nuovaPosizione < 0) nuovaPosizione = framesRadar.length - 1;
  if (nuovaPosizione >= framesRadar.length) nuovaPosizione = 0;
  mostraFrameRadar(nuovaPosizione);
}

function fermaAnimazioneRadar() {
  if (timerAnimazioneRadar) {
    clearInterval(timerAnimazioneRadar);
    timerAnimazioneRadar = null;
    const bottone = document.getElementById("radar-play");
    if (bottone) bottone.textContent = "▶";
  }
}

function alternaAnimazioneRadar() {
  if (timerAnimazioneRadar) {
    fermaAnimazioneRadar();
  } else {
    const bottone = document.getElementById("radar-play");
    if (bottone) bottone.textContent = "⏸";
    timerAnimazioneRadar = setInterval(() => spostaFrameRadar(1), 600);
  }
}

function inizializzaRadar() {
  fermaAnimazioneRadar();
  if (mappaRadar) { mappaRadar.remove(); mappaRadar = null; }

  const contenitore = document.getElementById("mappa-radar");
  if (!contenitore || typeof L === "undefined") return;

  mappaRadar = L.map("mappa-radar", { zoomControl: false, attributionControl: false, maxZoom: 7, minZoom: 6 }).setView([42.75, 13.8], 7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { subdomains: "abc", maxZoom: 7, className: "livello-mappa-scuro" }).addTo(mappaRadar);
  L.circleMarker([42.68, 14.0], { radius: 5, color: "#2F9E44" }).addTo(mappaRadar).bindTooltip("Roseto/Pineto", { permanent: false, direction: "top", className: "mono" });

  // Raggio di copertura delle sentinelle attorno a Roseto — due anelli
  // (20km e 40km), stessi valori usati dal server in meteoHelpers.js.
  const CENTRO_SENTINELLE = [42.68, 14.0];
  const R_KM = 111.32;
  const latRad = (CENTRO_SENTINELLE[0] * Math.PI) / 180;

  [20000, 40000].forEach((raggioM) => {
    L.circle(CENTRO_SENTINELLE, {
      radius: raggioM,
      color: "#C99B4A",
      weight: 1.5,
      fillColor: "#C99B4A",
      fillOpacity: 0.04,
      dashArray: "4 4",
    }).addTo(mappaRadar);
  });

  [20, 40].forEach((raggioKm) => {
    [0, 45, 90, 135, 180, 225, 270, 315].forEach((bearing) => {
      const bearingRad = (bearing * Math.PI) / 180;
      const dLat = (raggioKm / R_KM) * Math.cos(bearingRad);
      const dLon = (raggioKm / (R_KM * Math.cos(latRad))) * Math.sin(bearingRad);
      L.circleMarker([CENTRO_SENTINELLE[0] + dLat, CENTRO_SENTINELLE[1] + dLon], {
        radius: 4, color: "#C99B4A", fillColor: "#C99B4A", fillOpacity: 0.8,
      }).addTo(mappaRadar);
    });
  });

  fetch("https://api.rainviewer.com/public/weather-maps.json")
    .then((r) => r.json())
    .then((dati) => {
      hostRadar = dati.host;
      const passati = dati.radar?.past || [];
      const nowcast = dati.radar?.nowcast || [];
      framesRadar = [...passati, ...nowcast];
      numeroFrameNowcastRadar = nowcast.length;
      mostraFrameRadar(passati.length > 0 ? passati.length - 1 : 0);
    })
    .catch(() => {
      const testoTempo = document.getElementById("radar-tempo");
      if (testoTempo) testoTempo.textContent = "radar non disponibile al momento";
    });

  document.getElementById("radar-play")?.addEventListener("click", alternaAnimazioneRadar);
  document.getElementById("radar-prev")?.addEventListener("click", () => { fermaAnimazioneRadar(); spostaFrameRadar(-1); });
  document.getElementById("radar-next")?.addEventListener("click", () => { fermaAnimazioneRadar(); spostaFrameRadar(1); });

  document.querySelectorAll("#selettore-satellite [data-layer]").forEach((el) => {
    el.addEventListener("click", () => {
      layerSatelliteSelezionato = el.getAttribute("data-layer");
      document.querySelectorAll("#selettore-satellite [data-layer]").forEach((b) => b.classList.remove("attiva"));
      el.classList.add("attiva");
      const layerInfo = LAYER_SATELLITE.find((l) => l.id === layerSatelliteSelezionato);
      document.getElementById("immagine-satellite").src = urlImmagineSatellite(layerSatelliteSelezionato);
      document.querySelector(".pannello-satellite .satellite-nota").textContent =
        `EUMETView (EUMETSAT) — aggiornamento ogni 15 min circa. ${layerInfo.nota}`;
    });
  });
}

  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const erroreEl = document.getElementById("login-errore");
  erroreEl.textContent = "";

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (errore) {
    erroreEl.textContent = "Email o password non corretti.";
  }
});

document.getElementById("login-password").addEventListener("keydown", (evento) => {
  if (evento.key === "Enter") document.getElementById("login-bottone").click();
});

document.getElementById("btn-esci").addEventListener("click", () => signOut(auth));
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  }
</script>

</body>
